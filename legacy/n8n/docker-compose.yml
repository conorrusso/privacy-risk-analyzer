services:
  n8n:
    image: n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - ~/.n8n:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_RUNNERS_ENABLED=false
    restart: unless-stopped

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: gotenberg
    ports:
      - "3000:3000"
    restart: unless-stopped

  browserless:
    image: ghcr.io/browserless/chromium
    container_name: browserless
    ports:
      - "3001:3000"
    environment:
      - TOKEN=privacy-lens
      - TIMEOUT=60000
      - CONCURRENT=5
    restart: unless-stopped